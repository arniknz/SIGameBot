[tool.basedpyright]
extraPaths = ["app"]
pythonVersion = "3.12"

[tool.ruff]
line-length = 80
indent-width = 4
target-version = "py312"
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".gitlab",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "alembic",
    "_build",
    "buck-out",
    "build",
    "dist",
    "docker",
    "env",
    "etc",
    "requirements",
    "venv"
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.ruff.lint]
fixable = ["I", "RUF022", "RUF023"]
preview = true
extend-select = [
    "ASYNC",
    "A001",
    "B",
    "C4",
    "C901",
    "COM818",
    "COM819",
    "D",
    "E",
    "FLY",
    "FBT003",
    "G",
    "I",
    "INP",
    "ISC003",
    "LOG",
    "N",
    "PGH",
    "PIE",
    "PYI",
    "PL",
    "PT",
    "PERF",
    "PLR",
    "RET",
    "RSE",
    "RUF",
    "SIM",
    "T20",
    "TRY300",
    "TRY401",
    "UP",
    "YTT",
]

extend-ignore = [
    "D1",
    "D205",
    "D415",
    "PLR2004",
    "PLR0904",
    "PLR0917",
    "PLR6201",
    "PLR6301",
    "PLW1514",
    "PLW1641",
    "PLR0913",
    "PLR1714",
    "PERF203",
    "PT007",
    "RUF001",
    "RUF002",
    "RUF003",
    "RUF012",
    "RUF021",
    "SIM105",
    "SIM108",
    "SIM117",
    "UP012",
    "UP015",
    "UP032",
    "W191",
    "E111",
    "E114",
    "E117",
    "D206",
    "D300",
    "Q000",
    "Q001",
    "Q002",
    "Q003",
    "COM812",
    "COM819",
    "ISC001",
    "ISC002",
]

[tool.ruff.lint.extend-per-file-ignores]
"__init__.py" = ["F403", "PLC0415", "RUF067"]
"app/game/models/game.py" = ["TC004"]
"app/game/models/question.py" = ["TC004"]
"app/game/models/shop.py" = ["TC004"]
"app/game/models/user.py" = ["TC004"]
"routes.py" = ["PLC0415"]
"urls.py" = ["PLC0415"]
"store.py" = ["PLC0415"]
"tests/*.py" = ["SIM300", "F403", "F405", "INP001"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
combine-as-imports = true

[tool.ruff.lint.flake8-unused-arguments]
ignore-variadic-names = true

[tool.ruff.lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false

[tool.pytest.ini_options]
asyncio_mode="auto"
filterwarnings = [
    "ignore::DeprecationWarning:asyncpg.*:",
    "ignore::DeprecationWarning:pytest_asyncio.plugin.*:",
    "ignore::DeprecationWarning",
]
