services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_DB: ${DB_NAME:-sigamebot}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      network: host
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
    volumes:
      - ./logs:/opt/app/logs

volumes:
  pgdata:
