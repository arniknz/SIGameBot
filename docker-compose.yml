services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_DB: ${DB_NAME:-sigamebot}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    network_mode: host
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  embedding:
    build:
      context: ./services/embedding
      network: host
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      EMBEDDING_PORT: ${EMBEDDING_PORT:-8001}
      SENTENCE_TRANSFORMER_MODEL: ${SENTENCE_TRANSFORMER_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      USE_FP16: ${USE_FP16:-true}
      EMBEDDING_CACHE_SIZE: ${EMBEDDING_CACHE_SIZE:-1000}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  bot:
    build:
      context: .
      network: host
    restart: unless-stopped
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      embedding:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      RABBITMQ_HOST: 127.0.0.1
      RABBITMQ_PORT: 5672
      EMBEDDING_SERVICE_URL: http://127.0.0.1:${EMBEDDING_PORT:-8001}
    volumes:
      - ./logs:/opt/logs

  admin_api:
    build:
      context: .
      network: host
    restart: unless-stopped
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
      embedding:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      ADMIN_API_PORT: ${ADMIN_API_PORT:-8000}
      EMBEDDING_SERVICE_URL: http://127.0.0.1:${EMBEDDING_PORT:-8001}
    command:
      [
        "uvicorn",
        "web.api.main:app",
        "--host", "0.0.0.0",
        "--port", "${ADMIN_API_PORT:-8000}",
      ]

volumes:
  pgdata:
  rabbitmqdata:
